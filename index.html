<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WASTAMA V11</title>
<style>
body{margin:0;overflow:hidden;background:black;font-family:Arial}
#menu{
position:absolute;top:40%;left:50%;
transform:translate(-50%,-50%);
color:white;text-align:center;
}
#topBar{
position:absolute;top:10px;left:0;width:100%;
display:flex;justify-content:space-between;
padding:0 20px;color:white;
}
button{padding:10px;margin:5px;font-size:16px;cursor:pointer}
#hud{position:absolute;top:70px;left:20px;color:white;display:none;}
#gameOver{
position:absolute;top:40%;left:50%;
transform:translate(-50%,-50%);
color:white;text-align:center;display:none;
}
</style>
</head>
<body>

<div id="topBar">
<div>
<div id="gamesPlayedText"></div>
<div id="gamesWonText"></div>
</div>
</div>

<div id="menu">
<h1>WASTAMA EILAND</h1>
<button onclick="startGame('ice')">❄ IJs Warrior</button>
</div>

<div id="hud">HP: <span id="hp">100</span></div>

<div id="gameOver">
<h1 id="endText"></h1>
<button onclick="location.reload()">Opnieuw spelen</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>

let scene,camera,renderer;
let player,enemies=[],playerBullets=[],botBullets=[],buildings=[];
let keys={},hp=100,gameActive=false;
let gamesPlayed=parseInt(localStorage.getItem("gamesPlayed"))||0;
let gamesWon=parseInt(localStorage.getItem("gamesWon"))||0;

updateTopBar();

function updateTopBar(){
document.getElementById("gamesPlayedText").innerText="Games gespeeld: "+gamesPlayed;
document.getElementById("gamesWonText").innerText="Games gewonnen: "+gamesWon;
}

function startGame(){

gamesPlayed++;
localStorage.setItem("gamesPlayed",gamesPlayed);
updateTopBar();

gameActive=true;
document.getElementById("menu").style.display="none";
document.getElementById("hud").style.display="block";

scene=new THREE.Scene();
camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,3000);
renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.HemisphereLight(0xffffff,0x444444,1));

/* SEA */
let sea=new THREE.Mesh(
new THREE.CircleGeometry(2000,64),
new THREE.MeshBasicMaterial({color:0x1e90ff})
);
sea.rotation.x=-Math.PI/2;
scene.add(sea);

/* ISLAND */
let island=new THREE.Mesh(
new THREE.CircleGeometry(600,64),
new THREE.MeshBasicMaterial({color:0x228B22})
);
island.rotation.x=-Math.PI/2;
island.position.y=0.1;
scene.add(island);

/* BUILDINGS */
for(let i=0;i<15;i++){
let h=80;
let b=new THREE.Mesh(
new THREE.BoxGeometry(50,h,50),
new THREE.MeshBasicMaterial({color:0x444444})
);
b.position.set((Math.random()-0.5)*800,h/2,(Math.random()-0.5)*800);
scene.add(b);
buildings.push(b);
}

/* ===== ICE WARRIOR 3D SPRITE ===== */

let loader=new THREE.TextureLoader();
let texture=loader.load("icewarrior.png");

let material=new THREE.MeshStandardMaterial({
map:texture,
transparent:true,
emissive:0x00ccff,
emissiveIntensity:0.7
});

let geometry=new THREE.PlaneGeometry(30,40);
player=new THREE.Mesh(geometry,material);
player.position.y=20;
scene.add(player);

/* ===== BOTS ===== */

for(let i=0;i<5;i++){
let bot=new THREE.Mesh(
new THREE.BoxGeometry(6,12,6),
new THREE.MeshBasicMaterial({color:0xffffff})
);
bot.position.set((Math.random()-0.5)*600,6,(Math.random()-0.5)*600);
bot.userData.cooldown=120;
bot.userData.moveDir=new THREE.Vector3(
(Math.random()-0.5),0,(Math.random()-0.5)
).normalize();
enemies.push(bot);
scene.add(bot);
}

document.addEventListener("keydown",e=>{
keys[e.key]=true;
if(e.code==="Space" && gameActive) shoot();
});
document.addEventListener("keyup",e=>keys[e.key]=false);
document.addEventListener("click",()=>{if(gameActive)shoot();});

animate();
}

function shoot(){
let bullet=new THREE.Mesh(
new THREE.SphereGeometry(2,8,8),
new THREE.MeshBasicMaterial({color:0x00ccff})
);
bullet.position.copy(player.position);
bullet.userData.dir=new THREE.Vector3(0,0,-1);
playerBullets.push(bullet);
scene.add(bullet);
}

function animate(){
requestAnimationFrame(animate);
if(!gameActive){ if(renderer) renderer.render(scene,camera); return; }

/* MOVEMENT */
if(keys["ArrowUp"]) player.position.z-=3;
if(keys["ArrowDown"]) player.position.z+=3;
if(keys["ArrowLeft"]) player.position.x-=3;
if(keys["ArrowRight"]) player.position.x+=3;

/* SEA DEATH */
if(player.position.length()>600){
endGame("VERDRONKEN");
}

/* PLAYER ALWAYS FACE CAMERA (DRAAI EFFECT) */
player.lookAt(camera.position);

/* PLAYER BULLETS */
for(let i=playerBullets.length-1;i>=0;i--){
let b=playerBullets[i];
b.position.z-=10;
for(let j=enemies.length-1;j>=0;j--){
if(b.position.distanceTo(enemies[j].position)<8){
scene.remove(enemies[j]);
enemies.splice(j,1);
scene.remove(b);
playerBullets.splice(i,1);
if(enemies.length===0){
gamesWon++;
localStorage.setItem("gamesWon",gamesWon);
updateTopBar();
endGame("GEWONNEN PROFICIAT");
}
break;
}
}
}

/* BOTS */
for(let bot of enemies){
bot.position.add(bot.userData.moveDir);
if(Math.random()<0.02){
bot.userData.moveDir=new THREE.Vector3(
(Math.random()-0.5),0,(Math.random()-0.5)
).normalize();
}
bot.userData.cooldown--;
if(bot.userData.cooldown<=0){
let dir=player.position.clone().sub(bot.position).normalize();
let bullet=new THREE.Mesh(
new THREE.SphereGeometry(2,8,8),
new THREE.MeshBasicMaterial({color:0xff0000})
);
bullet.position.copy(bot.position);
bullet.userData.dir=dir;
botBullets.push(bullet);
scene.add(bullet);
bot.userData.cooldown=120;
}
}

/* BOT BULLETS */
for(let i=botBullets.length-1;i>=0;i--){
let b=botBullets[i];
b.position.add(b.userData.dir.clone().multiplyScalar(8));
if(b.position.distanceTo(player.position)<10){
hp-=50;
document.getElementById("hp").innerText=hp;
scene.remove(b);
botBullets.splice(i,1);
if(hp<=0) endGame("GAME OVER");
}
}

camera.position.set(player.position.x-60,40,player.position.z+60);
camera.lookAt(player.position);

renderer.render(scene,camera);
}

function endGame(text){
gameActive=false;
document.getElementById("endText").innerText=text;
document.getElementById("gameOver").style.display="block";
}

</script>
</body>
</html>
