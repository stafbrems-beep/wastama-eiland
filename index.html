<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WASTAMA EILAND - Skins & Muziek</title>

<style>
body{margin:0;overflow:hidden;background:black;font-family:Arial;color:white;}
#difficultyMenu,#characterMenu,#gameOver{position:absolute;top:40%;left:50%;transform:translate(-50%,-50%);text-align:center;}
#characterMenu{display:none;}
#hud{position:absolute;top:60px;left:20px;display:none;}
#stats{position:absolute;top:10px;left:20px;}
#shopButton{position:absolute;top:10px;right:20px;background:#444;padding:10px;cursor:pointer;}
#shopMenu{display:none;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:600px;height:450px;background:#111;border:3px solid white;padding:20px;overflow:auto;}
button{padding:12px;margin:5px;font-size:16px;cursor:pointer;}
</style>
</head>

<body>

<div id="stats">
<div>Games gespeeld: <span id="played">0</span></div>
<div>Games gewonnen: <span id="won">0</span></div>
<div>Munten totaal: <span id="coinsTotal">0</span></div>
</div>

<div id="shopButton">SHOP</div>

<div id="difficultyMenu">
<h1>Kies moeilijkheid</h1>
<button onclick="chooseDifficulty('easy')">🙂 Makkelijk</button>
<button onclick="chooseDifficulty('hard')">😈 Moeilijk</button>
<button onclick="chooseDifficulty('impossible')">💀 Impossible</button>
</div>

<div id="characterMenu">
<h1>Kies je power</h1>
<button onclick="startGame('ice')">❄ IJs</button>
<button onclick="startGame('fire')">🔥 Vuur</button>
<button onclick="startGame('lightning')">⚡ Bliksem</button>
</div>

<div id="hud">
<div>Hits: <span id="hp">0</span> / 3</div>
<div>Gedood: <span id="kills">0</span></div>
<div>Munten: <span id="coins">0</span></div>
</div>

<div id="gameOver" style="display:none">
<h1 id="endText"></h1>
<button onclick="location.reload()">Opnieuw spelen</button>
</div>

<div id="shopMenu">
<div style="position:absolute;right:10px;top:10px;cursor:pointer;font-size:20px" onclick="closeShop()">✖</div>
<h2>SHOP</h2>
<div id="skinButtons"></div>
</div>

<iframe width="0" height="0"
src="https://www.youtube.com/embed/TddO_JZ-RDo?autoplay=1&loop=1&playlist=TddO_JZ-RDo&controls=0"
allow="autoplay"></iframe>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

let gamesPlayed=parseInt(localStorage.getItem("played"))||0
let gamesWon=parseInt(localStorage.getItem("won"))||0
let totalCoins=parseInt(localStorage.getItem("coins"))||0

let ownedSkins=JSON.parse(localStorage.getItem("skins"))||["default"]
let currentSkin=localStorage.getItem("selectedSkin") || "default"

played.innerText=gamesPlayed
won.innerText=gamesWon
coinsTotal.innerText=totalCoins

let difficulty="easy"
let powerType="ice"

let scene,camera,renderer,player
let enemies=[],bullets=[],enemyBullets=[],coinObjects=[]
let keys={},yaw=0,hits=0,kills=0,coins=0,gameActive=false,shootTimer=0,shootIndex=0,aPressed=false

let skinsData=[

{name:"Blok",id:"default",geom:"BoxGeometry",color:0x00ffff,cost:0},
{name:"Rode kubus",id:"red",geom:"BoxGeometry",color:0xff0000,cost:10},
{name:"Blauwe cilinder",id:"blue",geom:"CylinderGeometry",color:0x0066ff,cost:30},
{name:"Gouden kegel",id:"gold",geom:"ConeGeometry",color:0xffcc00,cost:35},
{name:"Paarse bol",id:"purple",geom:"SphereGeometry",color:0x800080,cost:50},

{name:"Regenboog blok",id:"rainbowBox",geom:"BoxGeometry",rainbow:true,cost:200},
{name:"Regenboog cilinder",id:"rainbowCylinder",geom:"CylinderGeometry",rainbow:true,cost:250},
{name:"Regenboog bol",id:"rainbowSphere",geom:"SphereGeometry",rainbow:true,cost:350},
{name:"Regenboog kegel",id:"rainbowCone",geom:"ConeGeometry",rainbow:true,cost:400}

]

function updateShop(){

let container=document.getElementById("skinButtons")
container.innerHTML=""

for(let s of skinsData){

let btn=document.createElement("button")

if(!ownedSkins.includes(s.id) && s.cost>0){

btn.innerText=s.name+" - "+s.cost+" munten"
btn.onclick=()=>buySkin(s.id,s.cost)

}else{

btn.innerText="Gebruik "+s.name
btn.onclick=()=>{
currentSkin=s.id
localStorage.setItem("selectedSkin",s.id)
alert("Skin geselecteerd!")
}

}

container.appendChild(btn)

}

}

updateShop()

shopButton.onclick=function(){shopMenu.style.display="block"}
function closeShop(){shopMenu.style.display="none"}

function buySkin(skin,cost){

if(totalCoins<cost){alert("Niet genoeg munten");return}

totalCoins-=cost
coinsTotal.innerText=totalCoins

localStorage.setItem("coins",totalCoins)

ownedSkins.push(skin)
localStorage.setItem("skins",JSON.stringify(ownedSkins))

alert("Skin gekocht!")

updateShop()

}

function chooseDifficulty(mode){
difficulty=mode
difficultyMenu.style.display="none"
characterMenu.style.display="block"
}

function startGame(type){

powerType=type

gamesPlayed++
localStorage.setItem("played",gamesPlayed)
played.innerText=gamesPlayed

characterMenu.style.display="none"
hud.style.display="block"

gameActive=true

scene=new THREE.Scene()

camera=new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
2000
)

renderer=new THREE.WebGLRenderer()
renderer.setSize(window.innerWidth,window.innerHeight)

document.body.appendChild(renderer.domElement)

scene.add(new THREE.AmbientLight(0xffffff,1))

let sea=new THREE.Mesh(new THREE.CircleGeometry(2000,64),new THREE.MeshBasicMaterial({color:0x1e90ff}))
sea.rotation.x=-Math.PI/2
scene.add(sea)

let island=new THREE.Mesh(new THREE.CircleGeometry(600,64),new THREE.MeshBasicMaterial({color:0x228B22}))
island.rotation.x=-Math.PI/2
island.position.y=0.1
scene.add(island)

for(let i=0;i<25;i++){
let trunk=new THREE.Mesh(new THREE.CylinderGeometry(2,2,20),new THREE.MeshBasicMaterial({color:0x8b4513}))
let leaves=new THREE.Mesh(new THREE.ConeGeometry(10,25,8),new THREE.MeshBasicMaterial({color:0x228B22}))
trunk.position.set((Math.random()-0.5)*900,10,(Math.random()-0.5)*900)
leaves.position.set(trunk.position.x,25,trunk.position.z)
scene.add(trunk)
scene.add(leaves)
}

let s=skinsData.find(s=>s.id===currentSkin)

let geom

switch(s.geom){
case "BoxGeometry": geom=new THREE.BoxGeometry(8,12,8); break
case "CylinderGeometry": geom=new THREE.CylinderGeometry(6,6,12,16); break
case "ConeGeometry": geom=new THREE.ConeGeometry(8,16,16); break
case "SphereGeometry": geom=new THREE.SphereGeometry(7,16,16); break
}

let mat

if(s.rainbow){
mat=new THREE.MeshNormalMaterial()
}else{
mat=new THREE.MeshBasicMaterial({color:s.color})
}

player=new THREE.Mesh(geom,mat)
player.position.y=6
scene.add(player)

document.addEventListener("keydown",e=>{keys[e.key.toLowerCase()]=true})
document.addEventListener("keyup",e=>{keys[e.key.toLowerCase()]=false})
document.addEventListener("mousemove",e=>{yaw-=e.movementX*0.002})

animate()

}

function animate(){

requestAnimationFrame(animate)
if(!gameActive)return

if(keys["arrowup"]||keys["z"])player.position.z-=4
if(keys["arrowdown"]||keys["s"])player.position.z+=4
if(keys["arrowleft"]||keys["q"])player.position.x-=4
if(keys["arrowright"]||keys["d"])player.position.x+=4

camera.position.x=player.position.x-Math.sin(yaw)*40
camera.position.z=player.position.z+Math.cos(yaw)*40
camera.position.y=25

camera.lookAt(player.position)

renderer.render(scene,camera)

}

</script>
</body>
</html>
