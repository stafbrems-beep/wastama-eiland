<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WASTAMA V9</title>
<style>
body{margin:0;overflow:hidden;background:black;font-family:Arial}

/* MENU */
#menu{
position:absolute;
top:40%;
left:50%;
transform:translate(-50%,-50%);
color:white;
text-align:center;
}

#topBar{
position:absolute;
top:10px;
left:0;
width:100%;
display:flex;
justify-content:space-between;
padding:0 20px;
color:white;
}

button{padding:10px;margin:5px;font-size:16px;cursor:pointer}

#hud{
position:absolute;
top:50px;
left:20px;
color:white;
display:none;
}

/* SHOP */
#shopOverlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:none;
}

#shopWindow{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:70%;
height:70%;
background:#222;
border-radius:20px;
color:white;
padding:20px;
}

#closeShop{
position:absolute;
top:10px;
right:20px;
font-size:30px;
cursor:pointer;
}

/* GAME OVER */
#gameOver{
position:absolute;
top:40%;
left:50%;
transform:translate(-50%,-50%);
color:white;
text-align:center;
display:none;
}
</style>
</head>
<body>

<div id="topBar">
<div id="gamesText"></div>
<button onclick="openShop()">SHOP</button>
</div>

<div id="menu">
<h1>WASTAMA EILAND</h1>
<button onclick="startGame('ice')">❄ IJs</button>
<button onclick="startGame('fire')">🔥 Vuur</button>
<button onclick="startGame('volt')">⚡ Bliksem</button>
</div>

<div id="hud">HP: <span id="hp">100</span></div>

<div id="shopOverlay">
<div id="shopWindow">
<div id="closeShop" onclick="closeShop()">✖</div>
<h2>SHOP</h2>
<p>Hier komen later items...</p>
</div>
</div>

<div id="gameOver">
<h1 id="endText"></h1>
<button onclick="location.reload()">Opnieuw spelen</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>

let scene,camera,renderer,raycaster;
let player,enemies=[],playerBullets=[],botBullets=[],buildings=[];
let keys={},yaw=0;
let hp=100;
let gameActive=false;
let character="ice";
let mouse=new THREE.Vector2();

let games=parseInt(localStorage.getItem("gamesPlayed"))||0;
document.getElementById("gamesText").innerText="Games gespeeld: "+games;

function startGame(type){

character=type;
games++;
localStorage.setItem("gamesPlayed",games);
document.getElementById("gamesText").innerText="Games gespeeld: "+games;

gameActive=true;
document.getElementById("menu").style.display="none";
document.getElementById("hud").style.display="block";

scene=new THREE.Scene();
camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,3000);
renderer=new THREE.WebGLRenderer();
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

raycaster=new THREE.Raycaster();

scene.add(new THREE.AmbientLight(0xffffff,1));

/* SEA */
let sea=new THREE.Mesh(
new THREE.CircleGeometry(2000,64),
new THREE.MeshBasicMaterial({color:0x1e90ff})
);
sea.rotation.x=-Math.PI/2;
scene.add(sea);

/* ISLAND */
let island=new THREE.Mesh(
new THREE.CircleGeometry(600,64),
new THREE.MeshBasicMaterial({color:0x228B22})
);
island.rotation.x=-Math.PI/2;
island.position.y=0.1;
scene.add(island);

/* BUILDINGS */
for(let i=0;i<20;i++){
let h=80;
let b=new THREE.Mesh(
new THREE.BoxGeometry(50,h,50),
new THREE.MeshBasicMaterial({color:0x444444})
);
b.position.set((Math.random()-0.5)*800,h/2,(Math.random()-0.5)*800);
scene.add(b);
buildings.push(b);
}

/* TREES */
for(let i=0;i<50;i++){
let trunk=new THREE.Mesh(
new THREE.CylinderGeometry(3,3,15),
new THREE.MeshBasicMaterial({color:0x8b4513})
);
trunk.position.set((Math.random()-0.5)*1000,7,(Math.random()-0.5)*1000);
scene.add(trunk);

let leaves=new THREE.Mesh(
new THREE.SphereGeometry(10,16,16),
new THREE.MeshBasicMaterial({color:0x006400})
);
leaves.position.set(trunk.position.x,20,trunk.position.z);
scene.add(leaves);
}

/* PLAYER */
let color=0x00ffff;
if(type==="fire") color=0xff0000;
if(type==="volt") color=0xffff00;

player=new THREE.Mesh(
new THREE.BoxGeometry(6,12,6),
new THREE.MeshBasicMaterial({color:color})
);
player.position.y=6;
scene.add(player);

/* BOTS */
let botCount=Math.floor(Math.random()*7)+4;

for(let i=0;i<botCount;i++){
let bot=new THREE.Mesh(
new THREE.BoxGeometry(6,12,6),
new THREE.MeshBasicMaterial({color:0xffffff})
);
bot.position.set((Math.random()-0.5)*600,6,(Math.random()-0.5)*600);
bot.userData.cooldown=200;
bot.userData.moveDir=new THREE.Vector3(
(Math.random()-0.5),
0,
(Math.random()-0.5)
).normalize();
enemies.push(bot);
scene.add(bot);
}

document.addEventListener("keydown",e=>{
keys[e.key]=true;
if(e.code==="Space" && gameActive) shoot();
});
document.addEventListener("keyup",e=>keys[e.key]=false);

document.addEventListener("mousemove",e=>{
mouse.x=(e.clientX/window.innerWidth)*2-1;
mouse.y=-(e.clientY/window.innerHeight)*2+1;
if(document.pointerLockElement===document.body){
yaw-=e.movementX*0.002;
}
});

document.addEventListener("click",()=>{
if(gameActive) shoot();
document.body.requestPointerLock();
});

animate();
}

function shoot(){

let bulletColor=0x00ffff;
if(character==="fire") bulletColor=0xff3300;
if(character==="volt") bulletColor=0xffff00;

let bullet=new THREE.Mesh(
new THREE.SphereGeometry(2,8,8),
new THREE.MeshBasicMaterial({color:bulletColor})
);

bullet.position.copy(player.position);

/* CHECK IF AIMING AT BOT */
raycaster.setFromCamera(mouse,camera);
let intersects=raycaster.intersectObjects(enemies);

if(intersects.length>0){
let target=intersects[0].object;
bullet.userData.dir=target.position.clone().sub(player.position).normalize();
}else{
bullet.userData.dir=new THREE.Vector3(Math.sin(yaw),0,Math.cos(yaw));
}

playerBullets.push(bullet);
scene.add(bullet);
}

function animate(){
requestAnimationFrame(animate);
if(!gameActive){ renderer.render(scene,camera); return; }

/* MOVEMENT */
let speed=3;
if(keys["Shift"]) speed=6;

let move=new THREE.Vector3();
if(keys["ArrowUp"]) move.z-=speed;
if(keys["ArrowDown"]) move.z+=speed;
if(keys["ArrowLeft"]) move.x-=speed;
if(keys["ArrowRight"]) move.x+=speed;

move.applyAxisAngle(new THREE.Vector3(0,1,0),yaw);
let newPos=player.position.clone().add(move);

/* BUILDING COLLISION */
let blocked=false;
for(let b of buildings){
if(Math.abs(newPos.x-b.position.x)<30 &&
Math.abs(newPos.z-b.position.z)<30){
blocked=true;
}
}
if(!blocked) player.position.copy(newPos);

/* SEA DEATH */
if(player.position.length()>600){
endGame("VERDRONKEN");
}

/* PLAYER BULLETS */
for(let i=playerBullets.length-1;i>=0;i--){
let bullet=playerBullets[i];
bullet.position.add(bullet.userData.dir.clone().multiplyScalar(10));

for(let j=enemies.length-1;j>=0;j--){
let bot=enemies[j];
if(bullet.position.distanceTo(bot.position)<8){
scene.remove(bot);
scene.remove(bullet);
enemies.splice(j,1);
playerBullets.splice(i,1);
if(enemies.length===0) endGame("GEWONNEN PROFICIAT");
break;
}
}
}

/* BOTS MOVE + SHOOT */
for(let bot of enemies){

bot.position.add(bot.userData.moveDir.clone().multiplyScalar(1));

if(Math.random()<0.02){
bot.userData.moveDir=new THREE.Vector3(
(Math.random()-0.5),
0,
(Math.random()-0.5)
).normalize();
}

bot.userData.cooldown--;
if(bot.userData.cooldown<=0){
let dir=player.position.clone().sub(bot.position).normalize();
let bullet=new THREE.Mesh(
new THREE.SphereGeometry(2,8,8),
new THREE.MeshBasicMaterial({color:0xff0000})
);
bullet.position.copy(bot.position);
bullet.userData.dir=dir;
botBullets.push(bullet);
scene.add(bullet);
bot.userData.cooldown=120;
}
}

/* BOT BULLETS */
for(let i=botBullets.length-1;i>=0;i--){
let bullet=botBullets[i];
bullet.position.add(bullet.userData.dir.clone().multiplyScalar(8));
if(bullet.position.distanceTo(player.position)<8){
hp-=50;
document.getElementById("hp").innerText=hp;
scene.remove(bullet);
botBullets.splice(i,1);
if(hp<=0) endGame("GAME OVER");
}
}

/* CAMERA */
camera.position.set(
player.position.x - Math.sin(yaw)*40,
25,
player.position.z - Math.cos(yaw)*40
);
camera.lookAt(player.position);

renderer.render(scene,camera);
}

function endGame(text){
gameActive=false;
document.getElementById("endText").innerText=text;
document.getElementById("gameOver").style.display="block";
}

function openShop(){
document.getElementById("shopOverlay").style.display="block";
}
function closeShop(){
document.getElementById("shopOverlay").style.display="none";
}

</script>
</body>
</html>
