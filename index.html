<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WASTAMA EILAND</title>

<style>
body{
  margin:0;
  overflow:hidden;
  background:black;
  font-family:Arial;
  color:white;
}

#difficultyMenu,
#characterMenu,
#gameOver{
  position:absolute;
  top:40%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
}

#characterMenu{display:none;}
#hud{position:absolute;top:60px;left:20px;display:none;}
#stats{
  position:absolute;
  top:10px;
  left:20px;
}

button{
  padding:12px;
  margin:5px;
  font-size:16px;
  cursor:pointer;
}

/* SHOP BUTTON */
#shopButton{
  position:absolute;
  top:10px;
  right:10px;
  padding:10px 20px;
  font-size:16px;
  cursor:pointer;
}

/* SHOP MODAL */
#shopModal{
  display:none;
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:300px;
  background:#222;
  border:2px solid #fff;
  padding:15px;
  z-index:100;
}

#shopModal h2{
  text-align:center;
  margin:0 0 10px 0;
}
#closeShop{
  display:block;
  margin:10px auto 0 auto;
  padding:8px 16px;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- Stats alleen in lobby -->
<div id="stats">
  <div>Games gespeeld: <span id="played">0</span></div>
  <div>Games gewonnen: <span id="won">0</span></div>
</div>

<!-- Shop knop -->
<button id="shopButton">Shop</button>

<!-- Shop Modal -->
<div id="shopModal">
  <h2>Shop</h2>
  <p>Hier komen later items...</p>
  <button id="closeShop">Sluiten</button>
</div>

<div id="difficultyMenu">
  <h1>Kies moeilijkheid</h1>
  <button onclick="chooseDifficulty('easy')">🙂 Makkelijk</button>
  <button onclick="chooseDifficulty('hard')">😈 Moeilijk</button>
  <button onclick="chooseDifficulty('impossible')">💀 Impossible</button>
</div>

<div id="characterMenu">
  <h1>Kies je mannetje</h1>
  <button onclick="startGame()">❄ IJs</button>
  <button onclick="startGame()">🔥 Vuur</button>
  <button onclick="startGame()">⚡ Bliksem</button>
</div>

<div id="hud">
  <div>Hits: <span id="hp">0</span> / 3</div>
  <div>Gedood: <span id="kills">0</span></div>
</div>

<div id="gameOver" style="display:none">
  <h1 id="endText"></h1>
  <button onclick="location.reload()">Opnieuw spelen</button>
</div>

<iframe id="bgMusic" width="0" height="0" 
  src="https://www.youtube.com/embed/7MeRV4YxjOM?autoplay=1&loop=1&playlist=7MeRV4YxjOM&controls=0"
  frameborder="0" allow="autoplay"
  style="display:none;">
</iframe>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
// Lokaal opslaan
let gamesPlayed = parseInt(localStorage.getItem("played")) || 0;
let gamesWon = parseInt(localStorage.getItem("won")) || 0;

document.getElementById("played").innerText = gamesPlayed;
document.getElementById("won").innerText = gamesWon;

let difficulty = "easy";
let scene, camera, renderer, player;
let enemies = [], bullets = [], enemyBullets = [];
let keys = {}, yaw = 0;
let hits = 0, kills = 0;
let gameActive = false;
let shootTimer = 0, shootIndex = 0;

// SHOP BUTTON
const shopButton = document.getElementById("shopButton");
const shopModal = document.getElementById("shopModal");
const closeShop = document.getElementById("closeShop");

shopButton.addEventListener("click", ()=>{ shopModal.style.display = "block"; });
closeShop.addEventListener("click", ()=>{ shopModal.style.display = "none"; });

// Makkelijk, hard, impossible
function chooseDifficulty(mode){
  difficulty = mode;
  document.getElementById("difficultyMenu").style.display = "none";
  document.getElementById("characterMenu").style.display = "block";
}

// Start Game
function startGame(){
  gamesPlayed++;
  localStorage.setItem("played", gamesPlayed);

  document.getElementById("characterMenu").style.display = "none";
  document.getElementById("hud").style.display = "block";

  // Stats niet tonen tijdens het spel
  document.getElementById("stats").style.display = "none";

  gameActive = true;

  // Rest van je Three.js code hier...
  // Je kan hier de bestaande player, bots, etc. code plaatsen
}
</script>

</body>
</html>
