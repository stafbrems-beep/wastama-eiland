<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>

<body>

<div id="stats">
<div>Games gespeeld: <span id="played">0</span></div>
<div>Games gewonnen: <span id="won">0</span></div>
<div>Munten totaal: <span id="coinsTotal">0</span></div>
</div>

<div id="shopButton">SHOP</div>

<div id="difficultyMenu">
<h1>Kies moeilijkheid</h1>
<button onclick="chooseDifficulty('easy')">🙂 Makkelijk</button>
<button onclick="chooseDifficulty('hard')">😈 Moeilijk</button>
<button onclick="chooseDifficulty('impossible')">💀 Impossible</button>
</div>

<div id="characterMenu">
<h1>Kies power</h1>
<button onclick="startGame('ice')">❄ IJs</button>
<button onclick="startGame('fire')">🔥 Vuur</button>
<button onclick="startGame('lightning')">⚡ Bliksem</button>
</div>

<div id="hud">
<div>Hits: <span id="hp">0</span> / 3</div>
<div>Gedood: <span id="kills">0</span></div>
<div>Munten: <span id="coins">0</span></div>
</div>

<div id="gameOver" style="display:none">
<h1 id="endText"></h1>
<button onclick="restartGame()">Opnieuw spelen</button>
</div>

<div id="shopMenu">
<div style="position:absolute;right:10px;top:10px;cursor:pointer;font-size:20px"
onclick="closeShop()">✖</div>
<h2>SHOP</h2>
<div id="skinButtons"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

let gamesPlayed=parseInt(localStorage.getItem("played"))||0
let gamesWon=parseInt(localStorage.getItem("won"))||0
let totalCoins=parseInt(localStorage.getItem("coins"))||0

played.innerText=gamesPlayed
won.innerText=gamesWon
coinsTotal.innerText=totalCoins

let ownedSkins=JSON.parse(localStorage.getItem("skins"))||["default"]
let currentSkin=localStorage.getItem("currentSkin")||"default"

let skins=[

{name:"Default blok",id:"default",shape:"box",color:0x00ffff,cost:0},

{name:"Rode kubus",id:"red",shape:"box",color:0xff0000,cost:10},

{name:"Blauwe cilinder",id:"blue",shape:"cylinder",color:0x0066ff,cost:30},

{name:"Gouden kegel",id:"gold",shape:"cone",color:0xffcc00,cost:35},

{name:"Paarse bol",id:"purple",shape:"sphere",color:0x800080,cost:50},

{name:"Neon ster",id:"star",shape:"ico",color:0x00ffea,cost:70},

{name:"Diamant",id:"diamond",shape:"oct",color:0x00ffff,cost:120},

{name:"Rainbow cube",id:"rainbowcube",shape:"box",rainbow:true,cost:200},

{name:"Rainbow cylinder",id:"rainbowcyl",shape:"cylinder",rainbow:true,cost:250},

{name:"Rainbow sphere",id:"rainbowsphere",shape:"sphere",rainbow:true,cost:350}

]

function updateShop(){

let container=document.getElementById("skinButtons")
container.innerHTML=""

for(let s of skins){

let btn=document.createElement("button")

if(!ownedSkins.includes(s.id) && s.cost>0){

btn.innerText=s.name+" - "+s.cost+" munten"
btn.onclick=()=>buySkin(s.id,s.cost)

}else{

btn.innerText="Gebruik "+s.name
btn.onclick=()=>{
currentSkin=s.id
localStorage.setItem("currentSkin",s.id)
alert(s.name+" geselecteerd!")
}

}

container.appendChild(btn)

}

}

updateShop()

shopButton.onclick=function(){
shopMenu.style.display="block"
}

function closeShop(){
shopMenu.style.display="none"
}

function buySkin(id,cost){

if(totalCoins<cost){
alert("Niet genoeg munten")
return
}

totalCoins-=cost
coinsTotal.innerText=totalCoins
localStorage.setItem("coins",totalCoins)

ownedSkins.push(id)
localStorage.setItem("skins",JSON.stringify(ownedSkins))

currentSkin=id
localStorage.setItem("currentSkin",id)

alert("Skin gekocht!")

updateShop()

}

let scene,camera,renderer,player
let enemies=[],bullets=[],coinObjects=[]
let keys={}
let yaw=0
let hits=0
let kills=0
let coins=0
let gameActive=false

function chooseDifficulty(mode){
difficultyMenu.style.display="none"
characterMenu.style.display="block"
}

function startGame(){

gamesPlayed++
localStorage.setItem("played",gamesPlayed)
played.innerText=gamesPlayed

characterMenu.style.display="none"
hud.style.display="block"

gameActive=true

scene=new THREE.Scene()

camera=new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
2000
)

renderer=new THREE.WebGLRenderer()
renderer.setSize(window.innerWidth,window.innerHeight)
document.body.appendChild(renderer.domElement)

scene.add(new THREE.AmbientLight(0xffffff,1))

let island=new THREE.Mesh(
new THREE.CircleGeometry(600,64),
new THREE.MeshBasicMaterial({color:0x228B22})
)

island.rotation.x=-Math.PI/2
scene.add(island)

let s=skins.find(x=>x.id===currentSkin)

let geom

if(s.shape==="box")geom=new THREE.BoxGeometry(8,12,8)
if(s.shape==="cylinder")geom=new THREE.CylinderGeometry(6,6,12,16)
if(s.shape==="cone")geom=new THREE.ConeGeometry(8,16,16)
if(s.shape==="sphere")geom=new THREE.SphereGeometry(7,16,16)
if(s.shape==="ico")geom=new THREE.IcosahedronGeometry(8)
if(s.shape==="oct")geom=new THREE.OctahedronGeometry(8)

let mat=new THREE.MeshBasicMaterial({color:s.color||0xffffff})

player=new THREE.Mesh(geom,mat)
player.position.y=6
scene.add(player)

animate()

}

function animate(){

requestAnimationFrame(animate)

if(!gameActive)return

let s=skins.find(x=>x.id===currentSkin)

if(s.rainbow){
player.material.color.setHSL((Date.now()*0.001)%1,1,0.5)
}

renderer.render(scene,camera)

}

function restartGame(){

gameOver.style.display="none"
gameActive=false
renderer.domElement.remove()

difficultyMenu.style.display="block"

}

</script>

</body>
</html>
