/*---------------- Stats & Skins ----------------*/
let gamesPlayed=parseInt(localStorage.getItem("played"))||0;
let gamesWon=parseInt(localStorage.getItem("won"))||0;
let totalCoins=parseInt(localStorage.getItem("coins"))||0;
let ownedSkins=JSON.parse(localStorage.getItem("skins"))||["default"];
let currentSkin=ownedSkins[0];

played.innerText=gamesPlayed;
won.innerText=gamesWon;
coinsTotal.innerText=totalCoins;

let difficulty="easy";
let powerType="ice";
let scene,camera,renderer,player;

let botShootTimer=0;

let skinsData = [
{name:"Rode kubus", id:"red", geom:"BoxGeometry", color:0xff0000, cost:500},
{name:"Blauwe cilinder", id:"blue", geom:"CylinderGeometry", color:0x0066ff, cost:600},

{name:"Paarse bol", id:"purple", geom:"SphereGeometry", color:0x800080, cost:800},
{name:"Neon ster", id:"neon", geom:"IcosahedronGeometry", color:0x00ffea, cost:1500},
{name:"IJsblok", id:"iceblock", geom:"BoxGeometry", color:0x99ccff, cost:1200},

{name:"default", geom:"BoxGeometry", color:0x00ffff, cost:0}
];

/*---------------- Shop ----------------*/
function updateShop(){
  let container = document.getElementById("skinButtons");
  container.innerHTML="";
  for(let s of skinsData){
    if(!ownedSkins.includes(s.id) && s.cost>0){
      let btn = document.createElement("button");
      btn.innerText = s.name+" - "+s.cost+" munten";
      btn.onclick = ()=>buySkin(s.id,s.cost);
      container.appendChild(btn);
    } else {
      let btn = document.createElement("button");
      btn.innerText = "Gebruik "+s.name;
      btn.onclick = ()=>{currentSkin=s.id; alert(s.name+" geselecteerd!");};
      container.appendChild(btn);
    }
  }
}
updateShop();
shopButton.onclick=function(){shopMenu.style.display="block";}
function closeShop(){shopMenu.style.display="none";}
function buySkin(skin,cost){
  if(totalCoins<cost){alert("Niet genoeg munten"); return;}
  totalCoins-=cost; coinsTotal.innerText=totalCoins; localStorage.setItem("coins",totalCoins);
  ownedSkins.push(skin); localStorage.setItem("skins",JSON.stringify(ownedSkins));
  currentSkin=skin; alert("Skin gekocht!"); updateShop();
}

/*---------------- Game Start ----------------*/
function chooseDifficulty(mode){difficulty=mode; difficultyMenu.style.display="none"; characterMenu.style.display="block";}
function startGame(type){
