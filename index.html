<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WASTAMA EILAND</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial;
color:white;
}

#difficultyMenu,#characterMenu,#gameOver{
position:absolute;
top:40%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
}

#characterMenu{display:none;}

#hud{
position:absolute;
top:60px;
left:20px;
display:none;
}

#stats{
position:absolute;
top:10px;
left:20px;
}

.healthbar{
position:absolute;
width:40px;
height:6px;
background:red;
}

button{
padding:12px;
margin:5px;
font-size:16px;
cursor:pointer;
}
</style>
</head>

<body>

<div id="stats">
<div>Games gespeeld: <span id="played">0</span></div>
<div>Games gewonnen: <span id="won">0</span></div>
</div>

<div id="difficultyMenu">
<h1>Kies moeilijkheid</h1>
<button onclick="chooseDifficulty('easy')">🙂 Makkelijk</button>
<button onclick="chooseDifficulty('hard')">😈 Moeilijk</button>
<button onclick="chooseDifficulty('impossible')">💀 Impossible</button>
</div>

<div id="characterMenu">
<h1>Kies je mannetje</h1>
<button onclick="startGame('ice')">❄ IJs</button>
<button onclick="startGame('fire')">🔥 Vuur</button>
<button onclick="startGame('volt')">⚡ Bliksem</button>
</div>

<div id="hud">
<div>Hits: <span id="hp">0</span> / 3</div>
<div>Gedood: <span id="kills">0</span></div>
</div>

<div id="gameOver" style="display:none">
<h1 id="endText"></h1>
<button onclick="location.reload()">Opnieuw spelen</button>
</div>

<iframe width="0" height="0"
src="https://www.youtube.com/embed/7MeRV4YxjOM?autoplay=1&loop=1&playlist=7MeRV4YxjOM&controls=0"
frameborder="0" allow="autoplay"></iframe>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

let gamesPlayed=parseInt(localStorage.getItem("played"))||0
let gamesWon=parseInt(localStorage.getItem("won"))||0

played.innerText=gamesPlayed
won.innerText=gamesWon

let difficulty="easy"
let power="ice"

let scene,camera,renderer,player

let enemies=[]
let healthBars=[]
let bullets=[]
let enemyBullets=[]

let keys={}
let yaw=0

let hits=0
let kills=0
let gameActive=false

let shootTimer=0
let shootIndex=0

function chooseDifficulty(mode){
difficulty=mode
difficultyMenu.style.display="none"
characterMenu.style.display="block"
}

function startGame(type){

power=type

gamesPlayed++
localStorage.setItem("played",gamesPlayed)
played.innerText=gamesPlayed

characterMenu.style.display="none"
hud.style.display="block"

gameActive=true

scene=new THREE.Scene()

camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,5000)

renderer=new THREE.WebGLRenderer()
renderer.setSize(innerWidth,innerHeight)
document.body.appendChild(renderer.domElement)

scene.add(new THREE.AmbientLight(0xffffff,1))

/* SEA */

let sea=new THREE.Mesh(
new THREE.CircleGeometry(5000,64),
new THREE.MeshBasicMaterial({color:0x1e90ff})
)

sea.rotation.x=-Math.PI/2
scene.add(sea)

/* ISLAND (VEEL GROTER) */

let island=new THREE.Mesh(
new THREE.CircleGeometry(2000,64),
new THREE.MeshBasicMaterial({color:0x228B22})
)

island.rotation.x=-Math.PI/2
island.position.y=0.1
scene.add(island)

/* BUILDINGS */

for(let i=0;i<20;i++){

let building=new THREE.Mesh(
new THREE.BoxGeometry(80,120,80),
new THREE.MeshBasicMaterial({color:0x555555})
)

building.position.set((Math.random()-0.5)*3000,60,(Math.random()-0.5)*3000)

scene.add(building)

}

/* TREES */

for(let i=0;i<60;i++){

let trunk=new THREE.Mesh(
new THREE.CylinderGeometry(2,2,20),
new THREE.MeshBasicMaterial({color:0x8b4513})
)

let leaves=new THREE.Mesh(
new THREE.ConeGeometry(12,25),
new THREE.MeshBasicMaterial({color:0x228B22})
)

trunk.position.set((Math.random()-0.5)*3500,10,(Math.random()-0.5)*3500)

leaves.position.set(trunk.position.x,30,trunk.position.z)

scene.add(trunk)
scene.add(leaves)

}

/* PLAYER */

let color=0x00ffff
if(power==="fire")color=0xff3300
if(power==="volt")color=0xffff00

player=new THREE.Mesh(
new THREE.BoxGeometry(8,12,8),
new THREE.MeshBasicMaterial({color:color})
)

player.position.y=6
scene.add(player)

/* BOT COUNT */

let botCount=5
if(difficulty==="hard")botCount=10
if(difficulty==="impossible")botCount=18

for(let i=0;i<botCount;i++){

let bot=new THREE.Mesh(
new THREE.BoxGeometry(8,12,8),
new THREE.MeshBasicMaterial({color:0xffffff})
)

bot.position.set((Math.random()-0.5)*1500,6,(Math.random()-0.5)*1500)

bot.userData.hp=2

scene.add(bot)
enemies.push(bot)

/* HEALTH BAR */

let bar=document.createElement("div")
bar.className="healthbar"
document.body.appendChild(bar)

healthBars.push(bar)

}

/* CONTROLS */

document.addEventListener("keydown",e=>{
keys[e.key.toLowerCase()]=true

if(e.code==="Space")shoot()

if(e.key==="a")specialAbility()

})

document.addEventListener("keyup",e=>{
keys[e.key.toLowerCase()]=false
})

document.addEventListener("click",shoot)

document.addEventListener("mousemove",e=>{
yaw-=e.movementX*0.002
})

animate()

}

function shoot(){

let bullet=new THREE.Mesh(
new THREE.SphereGeometry(2),
new THREE.MeshBasicMaterial({color:0xffffff})
)

bullet.position.copy(player.position)

bullet.userData.dir=new THREE.Vector3(Math.sin(yaw),0,-Math.cos(yaw))

scene.add(bullet)

bullets.push(bullet)

}

function specialAbility(){

for(let bot of enemies){

let d=bot.position.distanceTo(player.position)

if(d<200){

if(power==="ice") bot.userData.frozen=180

if(power==="fire") bot.userData.hp-=2

if(power==="volt"){
bot.position.y+=20
}

}

}

}

function animate(){

requestAnimationFrame(animate)

if(!gameActive)return

/* PLAYER MOVE */

if(keys["arrowup"]||keys["z"])player.position.z-=6
if(keys["arrowdown"]||keys["s"])player.position.z+=6
if(keys["arrowleft"]||keys["q"])player.position.x-=6
if(keys["arrowright"]||keys["d"])player.position.x+=6

/* WATER DEATH */

if(player.position.length()>2000){
endGame("VERDRONKEN")
}

/* BULLETS */

for(let i=bullets.length-1;i>=0;i--){

let b=bullets[i]

b.position.add(b.userData.dir.clone().multiplyScalar(12))

for(let j=enemies.length-1;j>=0;j--){

let bot=enemies[j]

if(b.position.distanceTo(bot.position)<8){

bot.userData.hp--

if(bot.userData.hp<=0){

scene.remove(bot)
enemies.splice(j,1)

healthBars[j].remove()
healthBars.splice(j,1)

kills++
kills.innerText=kills

}

scene.remove(b)
bullets.splice(i,1)

break

}

}

}

/* UPDATE HEALTHBARS */

for(let i=0;i<enemies.length;i++){

let bot=enemies[i]

let vector=bot.position.clone()
vector.project(camera)

let x=(vector.x*0.5+0.5)*window.innerWidth
let y=(-vector.y*0.5+0.5)*window.innerHeight

healthBars[i].style.left=x+"px"
healthBars[i].style.top=y+"px"
healthBars[i].style.width=(bot.userData.hp*20)+"px"

}

/* BOT MOVE */

for(let bot of enemies){

if(bot.userData.frozen>0){
bot.userData.frozen--
continue
}

let dir=player.position.clone().sub(bot.position).normalize()

bot.position.add(dir.multiplyScalar(0.5))

}

/* BOT SHOOT */

shootTimer++

if(shootTimer>120){

shootTimer=0

for(let bot of enemies){

shootBot(bot)

}

}

/* BOT BULLETS */

for(let i=enemyBullets.length-1;i>=0;i--){

let b=enemyBullets[i]

b.position.add(b.userData.dir.clone().multiplyScalar(10))

if(b.position.distanceTo(player.position)<8){

hits++

hp.innerText=hits

scene.remove(b)
enemyBullets.splice(i,1)

if(hits>=3) endGame("GAME OVER")

}

}

/* CAMERA */

camera.position.x=player.position.x-Math.sin(yaw)*50
camera.position.z=player.position.z+Math.cos(yaw)*50
camera.position.y=30

camera.lookAt(player.position)

renderer.render(scene,camera)

}

function shootBot(bot){

let dir=player.position.clone().sub(bot.position).normalize()

let bullet=new THREE.Mesh(
new THREE.SphereGeometry(2),
new THREE.MeshBasicMaterial({color:0xff0000})
)

bullet.position.copy(bot.position)

bullet.userData.dir=dir

scene.add(bullet)

enemyBullets.push(bullet)

}

function endGame(text){

gameActive=false

endText.innerText=text
gameOver.style.display="block"

}

</script>

</body>
</html>
