```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WASTAMA EILAND</title>

<style>
body{margin:0;overflow:hidden;background:black;font-family:Arial;color:white;}

#difficultyMenu,#characterMenu,#gameOver{
position:absolute;top:40%;left:50%;
transform:translate(-50%,-50%);
text-align:center;
}

#characterMenu{display:none;}

#hud{position:absolute;top:60px;left:20px;display:none;}

#stats{position:absolute;top:10px;left:20px;}

#shopButton{
position:absolute;top:10px;right:20px;
background:#444;padding:10px;cursor:pointer;
}

#shopMenu{
display:none;position:absolute;
top:50%;left:50%;
transform:translate(-50%,-50%);
width:600px;height:400px;
background:#111;border:3px solid white;
padding:20px;
}

#crosshair{
position:absolute;
top:50%;left:50%;
transform:translate(-50%,-50%);
font-size:28px;
pointer-events:none;
}

button{padding:12px;margin:5px;font-size:16px;cursor:pointer;}
</style>
</head>

<body>

<div id="stats">
<div>Games gespeeld: <span id="played">0</span></div>
<div>Games gewonnen: <span id="won">0</span></div>
<div>Munten totaal: <span id="coinsTotal">0</span></div>
</div>

<div id="shopButton">SHOP</div>
<div id="crosshair">+</div>

<div id="difficultyMenu">
<h1>Kies moeilijkheid</h1>
<button onclick="chooseDifficulty('easy')">🙂 Makkelijk</button>
<button onclick="chooseDifficulty('hard')">😈 Moeilijk</button>
<button onclick="chooseDifficulty('impossible')">💀 Impossible</button>
</div>

<div id="characterMenu">
<h1>Kies je mannetje</h1>
<button onclick="startGame('ice')">❄ IJs</button>
<button onclick="startGame('fire')">🔥 Vuur</button>
<button onclick="startGame('lightning')">⚡ Bliksem</button>
</div>

<div id="hud">
<div>Hits: <span id="hp">0</span> / 3</div>
<div>Gedood: <span id="kills">0</span></div>
<div>Munten: <span id="coins">0</span></div>
</div>

<div id="gameOver" style="display:none">
<h1 id="endText"></h1>
<button onclick="location.reload()">Opnieuw spelen</button>
</div>

<div id="shopMenu">
<div style="position:absolute;right:10px;top:10px;cursor:pointer"
onclick="closeShop()">✖</div>
<h2>SHOP</h2>

<button onclick="buySkin('red',10)">Rode skin - 10 munten</button>
<button onclick="buySkin('blue',10)">Blauwe skin - 10 munten</button>
<button onclick="buySkin('gold',20)">Gouden skin - 20 munten</button>
</div>

<iframe width="0" height="0"
src="https://www.youtube.com/embed/TddO_JZ-RDo?autoplay=1&loop=1&playlist=TddO_JZ-RDo&controls=0"
allow="autoplay"></iframe>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

let gamesPlayed=parseInt(localStorage.getItem("played"))||0
let gamesWon=parseInt(localStorage.getItem("won"))||0
let totalCoins=parseInt(localStorage.getItem("coins"))||0

played.innerText=gamesPlayed
won.innerText=gamesWon
coinsTotal.innerText=totalCoins

let scene,camera,renderer,player
let enemies=[],bullets=[],enemyBullets=[]
let coinObjects=[]
let keys={}
let yaw=0

let hits=0
let kills=0
let coins=0
let gameActive=false

let shootTimer=0
let shootIndex=0

let difficulty="easy"
let currentSkin="default"

let ownedSkins=JSON.parse(localStorage.getItem("skins"))||["default"]

shopButton.onclick=()=>shopMenu.style.display="block"

function closeShop(){shopMenu.style.display="none"}

function buySkin(color,cost){

if(ownedSkins.includes(color)){
currentSkin=color
alert("Skin geselecteerd")
return
}

if(totalCoins<cost){
alert("Niet genoeg munten")
return
}

totalCoins-=cost
coinsTotal.innerText=totalCoins
localStorage.setItem("coins",totalCoins)

ownedSkins.push(color)
localStorage.setItem("skins",JSON.stringify(ownedSkins))

currentSkin=color
alert("Skin gekocht")

}

function chooseDifficulty(mode){
difficulty=mode
difficultyMenu.style.display="none"
characterMenu.style.display="block"
}

function startGame(){

gamesPlayed++
localStorage.setItem("played",gamesPlayed)

stats.style.display="none"
characterMenu.style.display="none"
hud.style.display="block"

gameActive=true

scene=new THREE.Scene()

camera=new THREE.PerspectiveCamera(
75,window.innerWidth/window.innerHeight,0.1,5000)

renderer=new THREE.WebGLRenderer()
renderer.setSize(window.innerWidth,window.innerHeight)
document.body.appendChild(renderer.domElement)

scene.add(new THREE.AmbientLight(0xffffff,1))

let sea=new THREE.Mesh(
new THREE.CircleGeometry(5000,64),
new THREE.MeshBasicMaterial({color:0x1e90ff})
)
sea.rotation.x=-Math.PI/2
scene.add(sea)

let island=new THREE.Mesh(
new THREE.CircleGeometry(2000,64),
new THREE.MeshBasicMaterial({color:0x228B22})
)
island.rotation.x=-Math.PI/2
island.position.y=0.1
scene.add(island)

for(let i=0;i<20;i++){

let mountain=new THREE.Mesh(
new THREE.ConeGeometry(80,200,6),
new THREE.MeshLambertMaterial({color:0x666666})
)

mountain.position.set(
(Math.random()-0.5)*3500,
100,
(Math.random()-0.5)*3500
)

scene.add(mountain)

}

let color=0x00ffff
if(currentSkin==="red")color=0xff0000
if(currentSkin==="blue")color=0x0066ff
if(currentSkin==="gold")color=0xffcc00

player=new THREE.Mesh(
new THREE.BoxGeometry(8,12,8),
new THREE.MeshBasicMaterial({color})
)

player.position.y=6
scene.add(player)

let botCount=5
if(difficulty==="hard")botCount=10
if(difficulty==="impossible")botCount=18

for(let i=0;i<botCount;i++){

let bot=new THREE.Mesh(
new THREE.BoxGeometry(8,12,8),
new THREE.MeshBasicMaterial({color:0xffffff})
)

bot.position.set((Math.random()-0.5)*1500,6,(Math.random()-0.5)*1500)
bot.userData.moveDir=new THREE.Vector3(Math.random()-0.5,0,Math.random()-0.5).normalize()

scene.add(bot)
enemies.push(bot)

}

for(let i=0;i<10;i++){

let coin=new THREE.Mesh(
new THREE.CylinderGeometry(4,4,2,16),
new THREE.MeshBasicMaterial({color:0xffff00})
)

coin.rotation.x=Math.PI/2
coin.position.set((Math.random()-0.5)*1500,6,(Math.random()-0.5)*1500)

scene.add(coin)
coinObjects.push(coin)

}

document.addEventListener("keydown",e=>{
keys[e.key.toLowerCase()]=true
if(e.code==="Space")shoot()
})

document.addEventListener("keyup",e=>{
keys[e.key.toLowerCase()]=false
})

document.addEventListener("mousemove",e=>{
yaw-=e.movementX*0.002
})

document.addEventListener("click",shoot)

animate()

}

function shoot(){

let bullet=new THREE.Mesh(
new THREE.SphereGeometry(2),
new THREE.MeshBasicMaterial({color:0xffffff})
)

bullet.position.copy(player.position)
bullet.userData.dir=new THREE.Vector3(Math.sin(yaw),0,-Math.cos(yaw))

scene.add(bullet)
bullets.push(bullet)

}

function shootBot(bot){

let dir=player.position.clone().sub(bot.position).normalize()

let bullet=new THREE.Mesh(
new THREE.SphereGeometry(2),
new THREE.MeshBasicMaterial({color:0xff0000})
)

bullet.position.copy(bot.position)
bullet.userData.dir=dir

scene.add(bullet)
enemyBullets.push(bullet)

}

function explode(pos){

let boom=new THREE.Mesh(
new THREE.SphereGeometry(6),
new THREE.MeshBasicMaterial({color:0xff6600})
)

boom.position.copy(pos)
scene.add(boom)

setTimeout(()=>scene.remove(boom),300)

}

function animate(){

requestAnimationFrame(animate)
if(!gameActive)return

for(let c of coinObjects)c.rotation.y+=0.05

if(keys["arrowup"]||keys["z"])player.position.z-=4
if(keys["arrowdown"]||keys["s"])player.position.z+=4
if(keys["arrowleft"]||keys["q"])player.position.x-=4
if(keys["arrowright"]||keys["d"])player.position.x+=4

for(let i=bullets.length-1;i>=0;i--){

let b=bullets[i]
b.position.add(b.userData.dir.clone().multiplyScalar(10))

for(let j=enemies.length-1;j>=0;j--){

let bot=enemies[j]

if(b.position.distanceTo(bot.position)<8){

explode(bot.position)

scene.remove(bot)
enemies.splice(j,1)

kills++
killsText.innerText=kills

scene.remove(b)
bullets.splice(i,1)

if(enemies.length===0){
gamesWon++
localStorage.setItem("won",gamesWon)
endGame("GEWONNEN!")
}

break

}

}

}

for(let bot of enemies){

bot.position.add(bot.userData.moveDir.clone().multiplyScalar(0.5))

if(Math.random()<0.02){

bot.userData.moveDir=
new THREE.Vector3(Math.random()-0.5,0,Math.random()-0.5).normalize()

}

}

shootTimer++

if(shootTimer>180){

shootTimer=0
let bot=enemies[shootIndex % enemies.length]

if(bot)shootBot(bot)

shootIndex++

}

for(let i=enemyBullets.length-1;i>=0;i--){

let b=enemyBullets[i]
b.position.add(b.userData.dir.clone().multiplyScalar(8))

if(b.position.distanceTo(player.position)<8){

hits++
hp.innerText=hits

scene.remove(b)
enemyBullets.splice(i,1)

if(hits>=3)endGame("GAME OVER")

}

}

camera.position.x=player.position.x-Math.sin(yaw)*40
camera.position.z=player.position.z+Math.cos(yaw)*40
camera.position.y=25

camera.lookAt(player.position)

renderer.render(scene,camera)

}

function endGame(text){

gameActive=false
endText.innerText=text
gameOver.style.display="block"

}

</script>

</body>
</html>
```
