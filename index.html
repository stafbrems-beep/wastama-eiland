<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WASTAMA EILAND</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial;
color:white;
}

#difficultyMenu,#characterMenu,#gameOver{
position:absolute;
top:40%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
}

#characterMenu{display:none;}

#hud{
position:absolute;
top:60px;
left:20px;
display:none;
}

#stats{
position:absolute;
top:10px;
left:20px;
}

button{
padding:12px;
margin:5px;
font-size:16px;
cursor:pointer;
}
</style>
</head>

<body>

<div id="stats">
<div>Games gespeeld: <span id="played">0</span></div>
<div>Games gewonnen: <span id="won">0</span></div>
</div>

<div id="difficultyMenu">
<h1>Kies moeilijkheid</h1>
<button onclick="chooseDifficulty('easy')">🙂 Makkelijk</button>
<button onclick="chooseDifficulty('hard')">😈 Moeilijk</button>
<button onclick="chooseDifficulty('impossible')">💀 Impossible</button>
</div>

<div id="characterMenu">
<h1>Kies je mannetje</h1>
<button onclick="startGame('ice')">❄ IJs</button>
<button onclick="startGame('fire')">🔥 Vuur</button>
<button onclick="startGame('volt')">⚡ Bliksem</button>
</div>

<div id="hud">
<div>Hits: <span id="hp">0</span> / 3</div>
<div>Gedood: <span id="kills">0</span></div>
</div>

<div id="gameOver" style="display:none">
<h1 id="endText"></h1>
<button onclick="location.reload()">Opnieuw spelen</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

let gamesPlayed=parseInt(localStorage.getItem("played"))||0
let gamesWon=parseInt(localStorage.getItem("won"))||0

played.innerText=gamesPlayed
won.innerText=gamesWon

let difficulty="easy"
let power="ice"

let scene,camera,renderer,player

let enemies=[]
let bullets=[]
let enemyBullets=[]
let explosions=[]

let keys={}
let yaw=0

let hits=0
let kills=0
let gameActive=false

let shootTimer=0
let shootIndex=0

function chooseDifficulty(mode){
difficulty=mode
difficultyMenu.style.display="none"
characterMenu.style.display="block"
}

function startGame(type){

power=type

gamesPlayed++
localStorage.setItem("played",gamesPlayed)
played.innerText=gamesPlayed

characterMenu.style.display="none"
hud.style.display="block"

gameActive=true

scene=new THREE.Scene()

camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,2000)

renderer=new THREE.WebGLRenderer()
renderer.setSize(innerWidth,innerHeight)
document.body.appendChild(renderer.domElement)

scene.add(new THREE.AmbientLight(0xffffff,1))

/* SEA */

let sea=new THREE.Mesh(
new THREE.CircleGeometry(2000,64),
new THREE.MeshBasicMaterial({color:0x1e90ff})
)

sea.rotation.x=-Math.PI/2
scene.add(sea)

/* ISLAND */

let island=new THREE.Mesh(
new THREE.CircleGeometry(600,64),
new THREE.MeshBasicMaterial({color:0x228B22})
)

island.rotation.x=-Math.PI/2
island.position.y=0.1
scene.add(island)

/* BUILDINGS */

for(let i=0;i<10;i++){

let building=new THREE.Mesh(
new THREE.BoxGeometry(60,80,60),
new THREE.MeshBasicMaterial({color:0x555555})
)

building.position.set((Math.random()-0.5)*800,40,(Math.random()-0.5)*800)

scene.add(building)

}

/* TREES */

for(let i=0;i<25;i++){

let trunk=new THREE.Mesh(
new THREE.CylinderGeometry(2,2,20),
new THREE.MeshBasicMaterial({color:0x8b4513})
)

let leaves=new THREE.Mesh(
new THREE.ConeGeometry(10,20),
new THREE.MeshBasicMaterial({color:0x0f7a0f})
)

trunk.position.set((Math.random()-0.5)*900,10,(Math.random()-0.5)*900)

leaves.position.set(trunk.position.x,25,trunk.position.z)

scene.add(trunk)
scene.add(leaves)

}

/* PLAYER */

let color=0x00ffff
if(power==="fire")color=0xff3300
if(power==="volt")color=0xffff00

player=new THREE.Mesh(
new THREE.BoxGeometry(8,12,8),
new THREE.MeshBasicMaterial({color:color})
)

player.position.y=6
scene.add(player)

/* BOT COUNT */

let botCount=5
if(difficulty==="hard")botCount=10
if(difficulty==="impossible")botCount=18

for(let i=0;i<botCount;i++){

let bot=new THREE.Mesh(
new THREE.BoxGeometry(8,12,8),
new THREE.MeshBasicMaterial({color:0xffffff})
)

bot.position.set((Math.random()-0.5)*500,6,(Math.random()-0.5)*500)

bot.userData.moveSpeed=0.4

/* BOT HEALTH */

if(difficulty==="easy"){
bot.userData.hp=1
}

if(difficulty==="hard"){
bot.userData.hp=2
}

if(difficulty==="impossible"){
bot.userData.hp=2
if(Math.random()<0.3) bot.userData.hp=1
}

enemies.push(bot)
scene.add(bot)

}

/* CONTROLS */

document.addEventListener("keydown",e=>{
keys[e.key.toLowerCase()]=true
if(e.code==="Space")shoot()
})

document.addEventListener("keyup",e=>{
keys[e.key.toLowerCase()]=false
})

document.addEventListener("click",shoot)

document.addEventListener("mousemove",e=>{
yaw-=e.movementX*0.002
})

animate()

}

function shoot(){

let speed=10
let damage=1

if(power==="volt")speed=16
if(power==="fire")damage=2

let bullet=new THREE.Mesh(
new THREE.SphereGeometry(2),
new THREE.MeshBasicMaterial({color:0xffffff})
)

bullet.position.copy(player.position)

bullet.userData.dir=new THREE.Vector3(Math.sin(yaw),0,-Math.cos(yaw))
bullet.userData.speed=speed
bullet.userData.damage=damage

scene.add(bullet)
bullets.push(bullet)

}

function animate(){

requestAnimationFrame(animate)
if(!gameActive)return

/* PLAYER MOVE */

if(keys["arrowup"]||keys["z"])player.position.z-=4
if(keys["arrowdown"]||keys["s"])player.position.z+=4
if(keys["arrowleft"]||keys["q"])player.position.x-=4
if(keys["arrowright"]||keys["d"])player.position.x+=4

/* WATER DEATH */

if(player.position.length()>600){
endGame("VERDRONKEN")
}

/* PLAYER BULLETS */

for(let i=bullets.length-1;i>=0;i--){

let b=bullets[i]

b.position.add(b.userData.dir.clone().multiplyScalar(b.userData.speed))

for(let j=enemies.length-1;j>=0;j--){

let bot=enemies[j]

if(b.position.distanceTo(bot.position)<8){

bot.userData.hp-=b.userData.damage

/* ICE POWER */

if(power==="ice"){
bot.userData.moveSpeed=0.1
}

if(bot.userData.hp<=0){

createExplosion(bot.position)

scene.remove(bot)
enemies.splice(j,1)

kills++
document.getElementById("kills").innerText=kills

}

scene.remove(b)
bullets.splice(i,1)

break
}

}

}

/* BOTS MOVE TOWARDS PLAYER */

for(let bot of enemies){

let dir=player.position.clone().sub(bot.position).normalize()

bot.position.add(dir.multiplyScalar(bot.userData.moveSpeed))

}

/* BOT SHOOT */

shootTimer++

if(difficulty==="easy"){

if(shootTimer>60){

shootTimer=0
let bot=enemies[shootIndex%enemies.length]

shootBot(bot)

shootIndex++

}

}

if(difficulty==="hard"||difficulty==="impossible"){

if(shootTimer>120){

shootTimer=0

for(let bot of enemies){
shootBot(bot)
}

}

}

/* BOT BULLETS */

for(let i=enemyBullets.length-1;i>=0;i--){

let b=enemyBullets[i]

b.position.add(b.userData.dir.clone().multiplyScalar(8))

if(b.position.distanceTo(player.position)<8){

hits++
document.getElementById("hp").innerText=hits

scene.remove(b)
enemyBullets.splice(i,1)

if(hits>=3){
endGame("GAME OVER")
}

}

}

/* CAMERA */

camera.position.x=player.position.x-Math.sin(yaw)*40
camera.position.z=player.position.z+Math.cos(yaw)*40
camera.position.y=25

camera.lookAt(player.position)

renderer.render(scene,camera)

/* WIN */

if(enemies.length===0){

gamesWon++
localStorage.setItem("won",gamesWon)

document.getElementById("won").innerText=gamesWon

endGame("GEWONNEN!")

}

}

function shootBot(bot){

let dir=player.position.clone().sub(bot.position).normalize()

let bullet=new THREE.Mesh(
new THREE.SphereGeometry(2),
new THREE.MeshBasicMaterial({color:0xff0000})
)

bullet.position.copy(bot.position)
bullet.userData.dir=dir

scene.add(bullet)

enemyBullets.push(bullet)

}

function createExplosion(pos){

for(let i=0;i<10;i++){

let part=new THREE.Mesh(
new THREE.SphereGeometry(1.5),
new THREE.MeshBasicMaterial({color:0xffaa00})
)

part.position.copy(pos)

part.userData.vel=new THREE.Vector3(
(Math.random()-0.5)*2,
Math.random()*2,
(Math.random()-0.5)*2
)

part.userData.life=40

scene.add(part)

explosions.push(part)

}

}

function endGame(text){

gameActive=false

document.getElementById("endText").innerText=text
document.getElementById("gameOver").style.display="block"

}

</script>

</body>
</html>
