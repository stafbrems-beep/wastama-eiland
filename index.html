<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WASTAMA COMPLETE</title>
<style>
body{margin:0;overflow:hidden;background:black;font-family:Arial}
#menu{
position:absolute;
top:40%;
left:50%;
transform:translate(-50%,-50%);
color:white;
text-align:center;
}
#topBar{
position:absolute;
top:10px;
left:0;
width:100%;
display:flex;
justify-content:space-between;
padding:0 20px;
color:white;
}
button{padding:10px;margin:5px;font-size:16px;cursor:pointer}
#hud{
position:absolute;
top:70px;
left:20px;
color:white;
display:none;
}
#shopOverlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:none;
}
#shopWindow{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:60%;
height:60%;
background:#222;
border-radius:20px;
color:white;
padding:20px;
}
#closeShop{
position:absolute;
top:10px;
right:20px;
font-size:28px;
cursor:pointer;
}
#gameOver{
position:absolute;
top:40%;
left:50%;
transform:translate(-50%,-50%);
color:white;
text-align:center;
display:none;
}
</style>
</head>
<body>

<div id="topBar">
<div>
<div id="gamesPlayedText"></div>
<div id="gamesWonText"></div>
</div>
<button onclick="openShop()">SHOP</button>
</div>

<div id="menu">
<h1>WASTAMA EILAND</h1>
<button onclick="startGame('ice')">❄ IJs</button>
<button onclick="startGame('fire')">🔥 Vuur</button>
<button onclick="startGame('volt')">⚡ Bliksem</button>
</div>

<div id="hud">HP: <span id="hp">100</span></div>

<div id="shopOverlay">
<div id="shopWindow">
<div id="closeShop" onclick="closeShop()">✖</div>
<h2>SHOP</h2>
<p>Hier komen later items...</p>
</div>
</div>

<div id="gameOver">
<h1 id="endText"></h1>
<button onclick="location.reload()">Opnieuw spelen</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>

let scene,camera,renderer;
let player,enemies=[],playerBullets=[],botBullets=[],buildings=[];
let keys={},yaw=0;
let hp=100;
let gameActive=false;
let character="ice";

let gamesPlayed=parseInt(localStorage.getItem("gamesPlayed"))||0;
let gamesWon=parseInt(localStorage.getItem("gamesWon"))||0;

updateTopBar();

function updateTopBar(){
document.getElementById("gamesPlayedText").innerText="Games gespeeld: "+gamesPlayed;
document.getElementById("gamesWonText").innerText="Games gewonnen: "+gamesWon;
}

function startGame(type){

character=type;
gamesPlayed++;
localStorage.setItem("gamesPlayed",gamesPlayed);
updateTopBar();

gameActive=true;
document.getElementById("menu").style.display="none";
document.getElementById("hud").style.display="block";

scene=new THREE.Scene();
camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,3000);
renderer=new THREE.WebGLRenderer();
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff,1));

let sea=new THREE.Mesh(
new THREE.CircleGeometry(2000,64),
new THREE.MeshBasicMaterial({color:0x1e90ff})
);
sea.rotation.x=-Math.PI/2;
scene.add(sea);

let island=new THREE.Mesh(
new THREE.CircleGeometry(600,64),
new THREE.MeshBasicMaterial({color:0x228B22})
);
island.rotation.x=-Math.PI/2;
island.position.y=0.1;
scene.add(island);

/* BUILDINGS */
for(let i=0;i<15;i++){
let h=80;
let b=new THREE.Mesh(
new THREE.BoxGeometry(50,h,50),
new THREE.MeshBasicMaterial({color:0x444444})
);
b.position.set((Math.random()-0.5)*800,h/2,(Math.random()-0.5)*800);
scene.add(b);
buildings.push(b);
}

/* PLAYER */
let color=0x00ffff;
if(type==="fire") color=0xff0000;
if(type==="volt") color=0xffff00;

player=new THREE.Mesh(
new THREE.BoxGeometry(6,12,6),
new THREE.MeshBasicMaterial({color:color})
);
player.position.y=6;
scene.add(player);

/* BOTS */
let botCount=Math.floor(Math.random()*7)+4;
for(let i=0;i<botCount;i++){
let bot=new THREE.Mesh(
new THREE.BoxGeometry(6,12,6),
new THREE.MeshBasicMaterial({color:0xffffff})
);
bot.position.set((Math.random()-0.5)*600,6,(Math.random()-0.5)*600);
bot.userData.cooldown=120;
bot.userData.moveDir=new THREE.Vector3(
(Math.random()-0.5),0,(Math.random()-0.5)
).normalize();
enemies.push(bot);
scene.add(bot);
}

document.addEventListener("keydown",e=>{
keys[e.key]=true;
if(e.code==="Space" && gameActive) shoot();
});
document.addEventListener("keyup",e=>keys[e.key]=false);
document.addEventListener("click",()=>{ if(gameActive) shoot(); });

animate();
}

function shoot(){

let bulletColor=0x00ffff;
if(character==="fire") bulletColor=0xff3300;
if(character==="volt") bulletColor=0xffff00;

let bullet=new THREE.Mesh(
new THREE.SphereGeometry(2,8,8),
new THREE.MeshBasicMaterial({color:bulletColor})
);

bullet.position.copy(player.position);
bullet.userData.dir=new THREE.Vector3(Math.sin(yaw),0,Math.cos(yaw));

playerBullets.push(bullet);
scene.add(bullet);
}

function animate(){
requestAnimationFrame(animate);
if(!gameActive){ if(renderer) renderer.render(scene,camera); return; }

let move=new THREE.Vector3();
if(keys["ArrowUp"]) move.z-=3;
if(keys["ArrowDown"]) move.z+=3;
if(keys["ArrowLeft"]) move.x-=3;
if(keys["ArrowRight"]) move.x+=3;

let newPos=player.position.clone().add(move);

/* COLLISION */
let blocked=false;
for(let b of buildings){
if(Math.abs(newPos.x-b.position.x)<30 &&
Math.abs(newPos.z-b.position.z)<30){
blocked=true;
}
}
if(!blocked) player.position.copy(newPos);

if(player.position.length()>600){
endGame("VERDRONKEN");
}

/* PLAYER BULLETS */
for(let i=playerBullets.length-1;i>=0;i--){
let bullet=playerBullets[i];
bullet.position.add(bullet.userData.dir.clone().multiplyScalar(10));

for(let j=enemies.length-1;j>=0;j--){
if(bullet.position.distanceTo(enemies[j].position)<8){
scene.remove(enemies[j]);
enemies.splice(j,1);
scene.remove(bullet);
playerBullets.splice(i,1);
if(enemies.length===0){
gamesWon++;
localStorage.setItem("gamesWon",gamesWon);
updateTopBar();
endGame("GEWONNEN PROFICIAT");
}
break;
}
}
}

/* BOTS */
for(let bot of enemies){

bot.position.add(bot.userData.moveDir.clone());

if(Math.random()<0.02){
bot.userData.moveDir=new THREE.Vector3(
(Math.random()-0.5),0,(Math.random()-0.5)
).normalize();
}

bot.userData.cooldown--;
if(bot.userData.cooldown<=0){
let dir=player.position.clone().sub(bot.position).normalize();
let bullet=new THREE.Mesh(
new THREE.SphereGeometry(2,8,8),
new THREE.MeshBasicMaterial({color:0xff0000})
);
bullet.position.copy(bot.position);
bullet.userData.dir=dir;
botBullets.push(bullet);
scene.add(bullet);
bot.userData.cooldown=120;
}
}

/* BOT BULLETS */
for(let i=botBullets.length-1;i>=0;i--){
let bullet=botBullets[i];
bullet.position.add(bullet.userData.dir.clone().multiplyScalar(8));
if(bullet.position.distanceTo(player.position)<8){
hp-=50;
document.getElementById("hp").innerText=hp;
scene.remove(bullet);
botBullets.splice(i,1);
if(hp<=0) endGame("GAME OVER");
}
}

camera.position.set(player.position.x-40,25,player.position.z-40);
camera.lookAt(player.position);

renderer.render(scene,camera);
}

function endGame(text){
gameActive=false;
document.getElementById("endText").innerText=text;
document.getElementById("gameOver").style.display="block";
}

function openShop(){ document.getElementById("shopOverlay").style.display="block"; }
function closeShop(){ document.getElementById("shopOverlay").style.display="none"; }

</script>
</body>
</html>
