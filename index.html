<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WASTAMA ULTRA V5</title>
<style>
body{margin:0;overflow:hidden;background:black;font-family:Arial}
#menu,#gameOver{position:absolute;top:40%;left:50%;transform:translate(-50%,-50%);color:white;text-align:center}
button{padding:10px;margin:5px;font-size:16px;cursor:pointer}
#hud{position:absolute;top:10px;left:10px;color:white;display:none}
</style>
</head>
<body>

<div id="menu">
<h1>WASTAMA EILAND</h1>
<button onclick="startGame()">Start</button>
</div>

<div id="hud">
HP: <span id="hp">100</span>
</div>

<div id="gameOver" style="display:none">
<h1 id="endText"></h1>
<button onclick="location.reload()">Opnieuw spelen</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>

let scene,camera,renderer;
let player,enemies=[],buildings=[],bullets=[];
let keys={},yaw=0;
let hp=100;

function startGame(){

document.getElementById("menu").style.display="none";
document.getElementById("hud").style.display="block";

scene=new THREE.Scene();
camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,2000);
renderer=new THREE.WebGLRenderer();
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff,1));

// Ground
let ground=new THREE.Mesh(
new THREE.CircleGeometry(500,64),
new THREE.MeshBasicMaterial({color:0x228B22})
);
ground.rotation.x=-Math.PI/2;
scene.add(ground);

// Buildings (hard collision)
for(let i=0;i<15;i++){
let h=60;
let b=new THREE.Mesh(
new THREE.BoxGeometry(40,h,40),
new THREE.MeshBasicMaterial({color:0x444444})
);
b.position.set((Math.random()-0.5)*600,h/2,(Math.random()-0.5)*600);
scene.add(b);
buildings.push(b);
}

// Player
player=new THREE.Mesh(
new THREE.BoxGeometry(5,10,5),
new THREE.MeshBasicMaterial({color:0x00aaff})
);
player.position.y=5;
scene.add(player);

// Bots
for(let i=0;i<5;i++){
let bot=new THREE.Mesh(
new THREE.BoxGeometry(5,10,5),
new THREE.MeshBasicMaterial({color:0xff0000})
);
bot.position.set((Math.random()-0.5)*400,5,(Math.random()-0.5)*400);
enemies.push(bot);
scene.add(bot);
}

document.addEventListener("keydown",e=>keys[e.key]=true);
document.addEventListener("keyup",e=>keys[e.key]=false);

document.body.onclick=()=>document.body.requestPointerLock();

document.addEventListener("mousemove",e=>{
if(document.pointerLockElement===document.body){
yaw-=e.movementX*0.002;
}
});

document.addEventListener("click",shoot);

animate();
}

function shoot(){

let bullet=new THREE.Mesh(
new THREE.SphereGeometry(2,8,8),
new THREE.MeshBasicMaterial({color:0xffff00})
);

bullet.position.copy(player.position);

bullet.userData.dir=new THREE.Vector3(
-Math.sin(yaw),
0,
-Math.cos(yaw)
);

bullets.push(bullet);
scene.add(bullet);
}

function animate(){
requestAnimationFrame(animate);

// Movement
let speed=2;
let move=new THREE.Vector3();

if(keys["ArrowUp"]) move.z-=speed;
if(keys["ArrowDown"]) move.z+=speed;
if(keys["ArrowLeft"]) move.x-=speed;
if(keys["ArrowRight"]) move.x+=speed;

move.applyAxisAngle(new THREE.Vector3(0,1,0),yaw);

let newPos=player.position.clone().add(move);

// Collision buildings
let blocked=false;
for(let b of buildings){
if(Math.abs(newPos.x-b.position.x)<25 &&
   Math.abs(newPos.z-b.position.z)<25){
blocked=true;
}
}

if(!blocked) player.position.copy(newPos);

// Bullets move + instant kill
for(let i=bullets.length-1;i>=0;i--){
let bullet=bullets[i];
bullet.position.add(bullet.userData.dir.clone().multiplyScalar(8));

for(let j=enemies.length-1;j>=0;j--){
let bot=enemies[j];
if(bullet.position.distanceTo(bot.position)<6){

scene.remove(bot);
scene.remove(bullet);

enemies.splice(j,1);
bullets.splice(i,1);

if(enemies.length===0){
endGame("YOU WIN");
}
break;
}
}
}

// Bots chase + HIGH DAMAGE
for(let bot of enemies){
let dir=player.position.clone().sub(bot.position).normalize();
bot.position.add(dir.multiplyScalar(1));

if(bot.position.distanceTo(player.position)<8){
hp-=2;   // BIG DAMAGE
document.getElementById("hp").innerText=hp;
if(hp<=0){
endGame("GAME OVER");
}
}
}

// Camera
camera.position.set(
player.position.x - Math.sin(yaw)*30,
20,
player.position.z - Math.cos(yaw)*30
);

camera.lookAt(player.position);

renderer.render(scene,camera);
}

function endGame(text){
document.getElementById("endText").innerText=text;
document.getElementById("gameOver").style.display="block";
}

</script>
</body>
</html>
